<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriSmart - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <i class="fas fa-leaf"></i>
                <h1>AgriSmart</h1>
            </div>
            <p class="tagline">Smart Farming Support System</p>
            
            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
            
            <p class="switch-form">Don't have an account? <a href="#" onclick="showRegister()">Register</a></p>
        </div>
        
        <div class="register-box" style="display: none;">
            <div class="logo">
                <i class="fas fa-leaf"></i>
                <h1>AgriSmart</h1>
            </div>
            <p class="tagline">Join Smart Farming</p>
            
            <form id="registerForm" class="auth-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">Register</button>
            </form>
            
            <p class="switch-form">Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
